# ============================================
# General Settings
# ============================================

# Use 256 colors and true color
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Enable mouse (scroll, click panes, resize panes)
set -g mouse on

# Start windows and panes at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition (no delay after pressing Escape)
set -sg escape-time 0

# Enable focus events (for vim/editors)
set -g focus-events on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# ============================================
# Key Bindings
# ============================================

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Easier splits (| for vertical, - for horizontal) in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with Alt + arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with prefix + Ctrl + arrow
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 3
bind -r C-Down resize-pane -D 3

# Switch windows with Shift + arrow (no prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window

# ============================================
# Status Bar
# ============================================

set -g status-position bottom
set -g status-interval 1
set -g status-style "bg=colour235,fg=colour136"

set -g status-left-length 30
set -g status-left "#[fg=colour232,bg=colour33,bold] #S #[default] "

set -g status-right-length 100
set -g status-right "#[fg=colour255,bg=colour235] CPU:#(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) | RAM:#(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) | SWAP:#(free | awk '/Swap/{if($2>0) printf \"%.0f%%\",$3/$2*100; else print \"0%\"}') | Up:#(awk '{printf \"%.0fd\", $1/86400}' /proc/uptime) #[default]#[fg=colour244] %Y-%m-%d #[fg=colour33]%H:%M "

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour232,bg=colour33,bold] #I:#W "

# ============================================
# Plugins (managed by tpm)
# ============================================

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# Initialize tpm (MUST be last line)
run '~/.tmux/plugins/tpm/tpm'
